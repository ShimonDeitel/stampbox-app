<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stampbox</title>
<style>
  body { margin:0; background:#0E1216; color:#E9EEF3; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
  .wrap { max-width:640px; margin:0 auto; padding:96px 24px; text-align:center; }
  h1 { font-size:2.4rem; margin-bottom:8px; }
  p.tag { color:#E9EEF3; opacity:0.7; font-size:1.1rem; margin-bottom:40px; }
  .card { background:#151A20; border-radius:20px; padding:32px; margin-bottom:24px; }
  .accent { color:#3A6EA5; }
  a.btn { display:inline-block; background:#3A6EA5; color:#111; font-weight:600; padding:14px 28px; border-radius:12px; text-decoration:none; margin-top:8px; }
  footer { margin-top:48px; font-size:0.85rem; opacity:0.5; }
  footer a { color:#3A6EA5; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #4FB0AE55 0%, #4FB0AE00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
  <div class="wrap">
    <h1>Stampbox</h1>
    <p class="tag">Catalog postage stamps by country and series.</p>
    <div class="card">
      <p>Simple, fast, offline-first. No account, no ads, no data collection.</p>
      <a class="btn" href="#">Available on the App Store</a>
    </div>
    <footer>
      <a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a><br>
      Contact: s0533495227@gmail.com
    </footer>
  </div>
</body>
</html>

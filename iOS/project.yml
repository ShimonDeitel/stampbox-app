name: Stampbox
options:
  bundleIdPrefix: com.shimondeitel.stampbox
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Stampbox:
    type: application
    platform: iOS
    sources:
      - path: Stampbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stampbox
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Stampbox/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StampboxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StampboxTests
      - path: Stampbox.storekit
    dependencies:
      - target: Stampbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stampbox.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StampboxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StampboxUITests
    dependencies:
      - target: Stampbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stampbox.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Stampbox:
    build:
      targets:
        Stampbox: all
        StampboxTests: [test]
        StampboxUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Stampbox.storekit
    test:
      config: Debug
      storeKitConfiguration: Stampbox.storekit
      targets:
        - StampboxTests
        - StampboxUITests
    archive:
      config: Release
